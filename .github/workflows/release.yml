name: Release

# Release model (first principles):
#
#   * The git tag is the single source of truth for a release version.
#     A release is produced iff a `vX.Y.Z` tag exists (or is created here).
#
#   * Three entry points, same job:
#       1. `push` of a `vX.Y.Z` tag   -> build and publish that tag.
#       2. `workflow_dispatch`        -> pick a bump (patch/minor/major) or
#          provide an explicit version; the workflow creates the tag.
#       3. `push` to `master` whose   -> opt-in auto-release. The head
#          head commit message         commit message must contain
#          contains `[release]`        `[release]` (defaults to patch) or
#                                      `[release:patch|minor|major]`.
#
#   * CI never mutates `master` (no VERSION bump commits, no branch pushes).
#     Branch protection therefore cannot break releases.
#
#   * Publishing is idempotent. Re-running the workflow for the same tag
#     updates the existing release and re-uploads assets instead of failing.
#
#   * The `VERSION` file in the repo is optional metadata for local dev
#     builds; at release time the tag overrides it via `WHISP_VERSION`.

on:
  push:
    branches: [master]
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump to apply (ignored if 'version' is set)."
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      version:
        description: "Optional explicit version x.y.z (overrides bump)."
        required: false
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: macos-15
    env:
      WHISP_APPLE_ID: ${{ secrets.APPLE_ID }}
      WHISP_APPLE_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
      WHISP_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      DEVELOPER_ID_CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
      DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve release version
        id: v
        env:
          EVENT_NAME: ${{ github.event_name }}
          REF_TYPE: ${{ github.ref_type }}
          REF_NAME: ${{ github.ref_name }}
          INPUT_BUMP: ${{ inputs.bump }}
          INPUT_VERSION: ${{ inputs.version }}
          HEAD_MSG: ${{ github.event.head_commit.message }}
        run: |
          set -euo pipefail

          bump_version() {
            local base="$1" kind="$2" major minor patch
            IFS='.' read -r major minor patch <<<"$base"
            case "$kind" in
              major) echo "$((major + 1)).0.0" ;;
              minor) echo "${major}.$((minor + 1)).0" ;;
              patch) echo "${major}.${minor}.$((patch + 1))" ;;
              *) echo "::error::Unknown bump '$kind'" >&2; return 1 ;;
            esac
          }

          latest_semver_tag() {
            git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1
          }

          SHOULD_RELEASE=true
          CREATE_TAG=false
          VERSION=""

          if [ "$EVENT_NAME" = "push" ] && [ "$REF_TYPE" = "tag" ]; then
            # Path 1: tag push. The tag is the version.
            VERSION="${REF_NAME#v}"

          elif [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            # Path 2: manual dispatch. Explicit version wins; otherwise bump.
            if [ -n "${INPUT_VERSION:-}" ]; then
              VERSION="$INPUT_VERSION"
            else
              LATEST="$(latest_semver_tag || true)"
              BASE="${LATEST#v}"
              BASE="${BASE:-0.0.0}"
              VERSION="$(bump_version "$BASE" "${INPUT_BUMP:-patch}")"
            fi
            CREATE_TAG=true

          elif [ "$EVENT_NAME" = "push" ] && [ "$REF_TYPE" = "branch" ]; then
            # Path 3: master push. Opt-in via [release] / [release:kind] in head commit.
            if printf '%s' "$HEAD_MSG" | grep -qiE '\[release(:(patch|minor|major))?\]'; then
              KIND="$(printf '%s' "$HEAD_MSG" \
                | grep -oiE '\[release:(patch|minor|major)\]' \
                | head -1 \
                | sed -E 's/.*:([a-z]+)\]/\1/' \
                | tr '[:upper:]' '[:lower:]' || true)"
              KIND="${KIND:-patch}"
              LATEST="$(latest_semver_tag || true)"
              BASE="${LATEST#v}"
              BASE="${BASE:-0.0.0}"
              VERSION="$(bump_version "$BASE" "$KIND")"
              CREATE_TAG=true
              echo "ℹ️ Auto-release requested via commit trailer (kind=$KIND)."
            else
              echo "ℹ️ No [release] trailer in head commit. Skipping release."
              SHOULD_RELEASE=false
            fi

          else
            echo "::error::Unsupported trigger ($EVENT_NAME / $REF_TYPE)."
            exit 1
          fi

          if [ "$SHOULD_RELEASE" = "true" ]; then
            if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "::error::Invalid version '$VERSION'. Expected x.y.z."
              exit 1
            fi
            TAG="v$VERSION"
            echo "version=$VERSION"        >> "$GITHUB_OUTPUT"
            echo "tag=$TAG"                >> "$GITHUB_OUTPUT"
            echo "create_tag=$CREATE_TAG"  >> "$GITHUB_OUTPUT"
            echo "WHISP_VERSION=$VERSION"  >> "$GITHUB_ENV"
            echo "🚀 Release $TAG (create_tag=$CREATE_TAG)"
          fi
          echo "should_release=$SHOULD_RELEASE" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        if: ${{ steps.v.outputs.should_release == 'true' && steps.v.outputs.create_tag == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.v.outputs.tag }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::error::Release $TAG already exists. Pick a new version or delete the existing release first."
            exit 1
          fi
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            echo "ℹ️ Tag $TAG already exists on origin; reusing it."
          else
            git config user.name  "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git tag -a "$TAG" -m "Whisp $TAG"
            git push origin "$TAG"
            echo "✅ Pushed tag $TAG"
          fi

      - name: Determine release packaging mode
        id: mode
        if: ${{ steps.v.outputs.should_release == 'true' }}
        run: |
          set -euo pipefail
          have_cert=false
          have_notary=false
          if [ -n "${DEVELOPER_ID_CERT_BASE64:-}" ] && [ -n "${DEVELOPER_ID_CERT_PASSWORD:-}" ]; then
            have_cert=true
          fi
          if [ -n "${WHISP_APPLE_ID:-}" ] && [ -n "${WHISP_APPLE_PASSWORD:-}" ] && [ -n "${WHISP_TEAM_ID:-}" ]; then
            have_notary=true
          fi
          if [ "$have_cert" = true ] && [ "$have_notary" = true ]; then
            mode=notarized; use_dev_id=true;  include_zip=false
          elif [ "$have_cert" = true ]; then
            mode=signed;    use_dev_id=true;  include_zip=true
            echo "::warning::No notarization credentials; publishing Developer ID signed but unnotarized release."
          else
            mode=adhoc;     use_dev_id=false; include_zip=true
            echo "::warning::No Developer ID certificate; publishing ad-hoc signed release."
          fi
          echo "mode=$mode"               >> "$GITHUB_OUTPUT"
          echo "use_dev_id=$use_dev_id"   >> "$GITHUB_OUTPUT"
          echo "include_zip=$include_zip" >> "$GITHUB_OUTPUT"
          echo "✅ Release mode: $mode"

      - name: Import Developer ID certificate
        if: ${{ steps.v.outputs.should_release == 'true' && steps.mode.outputs.use_dev_id == 'true' }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/dev-id-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          echo "$DEVELOPER_ID_CERT_BASE64" | base64 -D > "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERT_PATH" -P "$DEVELOPER_ID_CERT_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | tr -d '"')

          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" \
            | grep "Developer ID Application" | head -1 | awk '{print $2}')
          if [ -z "$IDENTITY" ]; then
            echo "::error::Developer ID Application certificate not found in keychain"
            exit 1
          fi
          echo "SIGNING_IDENTITY=$IDENTITY"      >> "$GITHUB_ENV"
          echo "BUILD_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "✅ Imported Developer ID: $IDENTITY"

      - name: Run tests
        if: ${{ steps.v.outputs.should_release == 'true' }}
        run: swift test

      - name: Build release app bundles
        if: ${{ steps.v.outputs.should_release == 'true' }}
        run: |
          set -euo pipefail
          case "${{ steps.mode.outputs.mode }}" in
            notarized)
              CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" ./scripts/build.sh --notarize
              ;;
            signed)
              CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" ./scripts/build.sh
              ;;
            adhoc)
              ./scripts/build.sh
              ;;
          esac

      - name: Create release DMG
        if: ${{ steps.v.outputs.should_release == 'true' }}
        run: |
          set -euo pipefail
          if [ "${{ steps.mode.outputs.mode }}" = "notarized" ]; then
            ./scripts/create-dmg.sh --notarize
          else
            ./scripts/create-dmg.sh
          fi

      - name: Create fallback app zip
        if: ${{ steps.v.outputs.should_release == 'true' && steps.mode.outputs.include_zip == 'true' }}
        run: ditto -c -k --keepParent "Whisp.app" "Whisp-${{ steps.v.outputs.version }}.zip"

      - name: Create checksum
        if: ${{ steps.v.outputs.should_release == 'true' }}
        run: |
          shasum -a 256 "Whisp-${{ steps.v.outputs.version }}.dmg" \
            > "Whisp-${{ steps.v.outputs.version }}.dmg.sha256"

      - name: Generate release notes
        id: notes
        if: ${{ steps.v.outputs.should_release == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          TAG="${{ steps.v.outputs.tag }}"
          MODE="${{ steps.mode.outputs.mode }}"
          NOTES=/tmp/release-notes.md

          cat > "$NOTES" <<'HEADER'
          ## Installation

          1. Download the `.dmg` file below and drag **Whisp.app** into `/Applications/`.
          2. The DMG also includes **Uninstall Whisp.app** if you want a full cleanup later.
          HEADER

          case "$MODE" in
            notarized)
              cat >> "$NOTES" <<'BODY'
          3. Open Whisp from `/Applications/`. On first launch, grant the requested permissions:
             - **Microphone** — for voice recording
             - **Accessibility** — for Smart Paste
             - **Input Monitoring** — for the global hotkey
          BODY
              ;;
            signed|adhoc)
              cat >> "$NOTES" <<'BODY'
          3. This build is not notarized. If macOS blocks it on first launch, run this once:
             ```bash
             sudo xattr -cr /Applications/Whisp.app
             ```
          4. Open Whisp from `/Applications/`. On first launch, grant the requested permissions:
             - **Microphone** — for voice recording
             - **Accessibility** — for Smart Paste
             - **Input Monitoring** — for the global hotkey

          > You only need to run the `xattr` command once per download. Permissions persist across app restarts.
          BODY
              ;;
          esac

          PREV_TAG="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname \
            | grep -v "^${TAG}$" | head -1 || true)"
          if [ -n "$PREV_TAG" ]; then
            {
              echo ""
              echo "## What's Changed"
              echo ""
            } >> "$NOTES"
            gh api "repos/${{ github.repository }}/compare/${PREV_TAG}...${TAG}" \
              --jq '.commits[] | "- " + (.commit.message | split("\n")[0]) + " (" + (.sha[:7]) + ")"' \
              >> "$NOTES" 2>/dev/null || true
          fi

          echo "path=$NOTES" >> "$GITHUB_OUTPUT"
          echo "--- release notes ---"
          cat "$NOTES"
          echo "---------------------"

      - name: Publish GitHub Release
        if: ${{ steps.v.outputs.should_release == 'true' }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.v.outputs.tag }}
          name: Whisp ${{ steps.v.outputs.version }}
          body_path: ${{ steps.notes.outputs.path }}
          draft: false
          prerelease: false
          # zip is only produced in signed/adhoc modes; allow it to be missing.
          fail_on_unmatched_files: false
          files: |
            Whisp-${{ steps.v.outputs.version }}.dmg
            Whisp-${{ steps.v.outputs.version }}.dmg.sha256
            Whisp-${{ steps.v.outputs.version }}.zip
