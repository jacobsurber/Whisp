name: Release

on:
  push:
    branches: [ master ]
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump to apply when version is not provided
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      version:
        description: Optional explicit version in x.y.z format
        required: false
        type: string

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  build-and-release:
    if: ${{ github.event_name == 'workflow_dispatch' || github.actor !=
      'github-actions[bot]' }}
    runs-on: macos-15
    env:
      WHISP_APPLE_ID: ${{ secrets.APPLE_ID }}
      WHISP_APPLE_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
      WHISP_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      DEVELOPER_ID_CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
      DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Require master branch
        run: |
          if [ "$GITHUB_REF_NAME" != "master" ]; then
            echo "❌ Run this workflow from master so the release is cut from the latest branch tip."
            exit 1
          fi

      - name: Determine release packaging mode
        id: release_mode
        run: |
          have_cert_secrets=false
          have_notary_credentials=false

          if [ -n "${DEVELOPER_ID_CERT_BASE64:-}" ] && [ -n "${DEVELOPER_ID_CERT_PASSWORD:-}" ]; then
            have_cert_secrets=true
          elif [ -n "${DEVELOPER_ID_CERT_BASE64:-}" ] || [ -n "${DEVELOPER_ID_CERT_PASSWORD:-}" ]; then
            echo "::warning::Developer ID certificate secrets are only partially configured. Falling back to the unsigned release path."
          fi

          if [ -n "${WHISP_APPLE_ID:-}" ] && [ -n "${WHISP_APPLE_PASSWORD:-}" ] && [ -n "${WHISP_TEAM_ID:-}" ]; then
            have_notary_credentials=true
          elif [ -n "${WHISP_APPLE_ID:-}" ] || [ -n "${WHISP_APPLE_PASSWORD:-}" ] || [ -n "${WHISP_TEAM_ID:-}" ]; then
            echo "::warning::Apple notarization secrets are only partially configured. Falling back to a non-notarized release."
          fi

          if [ "$have_cert_secrets" = true ] && [ "$have_notary_credentials" = true ]; then
            mode=notarized
            use_developer_id=true
            include_zip=false
            echo "✅ Release mode: notarized DMG"
          elif [ "$have_cert_secrets" = true ]; then
            mode=signed
            use_developer_id=true
            include_zip=true
            echo "::warning::Apple notarization credentials are missing. Publishing a Developer ID signed but unnotarized release."
          else
            mode=adhoc
            use_developer_id=false
            include_zip=true
            if [ "$have_notary_credentials" = true ]; then
              echo "::warning::Apple notarization credentials are present, but the Developer ID certificate secrets are missing. Publishing an ad-hoc signed release instead."
            else
              echo "::warning::No Apple release credentials are configured. Publishing an ad-hoc signed release."
            fi
          fi

          echo "mode=$mode" >> "$GITHUB_OUTPUT"
          echo "use_developer_id=$use_developer_id" >> "$GITHUB_OUTPUT"
          echo "include_zip=$include_zip" >> "$GITHUB_OUTPUT"

      - name: Import Developer ID certificate
        if: ${{ steps.release_mode.outputs.use_developer_id == 'true' }}
        run: |
          CERT_PATH="$RUNNER_TEMP/dev-id-cert.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/build.keychain-db"
          KEYCHAIN_PASSWORD="$(uuidgen)"

          # Decode certificate
          echo "$DEVELOPER_ID_CERT_BASE64" | base64 -D > "$CERT_PATH"

          # Create and configure temporary keychain
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Import certificate
          security import "$CERT_PATH" \
            -P "$DEVELOPER_ID_CERT_PASSWORD" \
            -A -t cert -f pkcs12 \
            -k "$KEYCHAIN_PATH"

          # Allow codesign to access the key without UI prompt
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

          # Add temporary keychain to search list
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | tr -d '"')

          # Verify identity is available
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | awk '{print $2}')
          if [ -z "$IDENTITY" ]; then
            echo "❌ Developer ID Application certificate not found in keychain"
            exit 1
          fi
          echo "SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "BUILD_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"
          echo "✅ Developer ID certificate imported: $IDENTITY"

      - name: Resolve release version
        id: release_version
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ github.event_name == 'workflow_dispatch' && inputs.version ||
            '' }}
          BUMP_TYPE: ${{ github.event_name == 'workflow_dispatch' && inputs.bump ||
            'patch' }}
        run: |
          version_gt() {
            local left="$1"
            local right="$2"
            local left_major left_minor left_patch right_major right_minor right_patch

            IFS='.' read -r left_major left_minor left_patch <<< "$left"
            IFS='.' read -r right_major right_minor right_patch <<< "$right"

            for pair in \
              "${left_major:-0} ${right_major:-0}" \
              "${left_minor:-0} ${right_minor:-0}" \
              "${left_patch:-0} ${right_patch:-0}"; do
              set -- $pair
              if ((10#$1 > 10#$2)); then
                return 0
              fi
              if ((10#$1 < 10#$2)); then
                return 1
              fi
            done

            return 1
          }

          version_lt() {
            version_gt "$2" "$1"
          }

          FILE_VERSION="$(cat VERSION | tr -d '[:space:]')"
          LATEST_TAG="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -1 || true)"
          BASE_VERSION="$FILE_VERSION"
          CURRENT_COMMIT="$(git rev-parse HEAD)"
          SEMVER_REGEX='^[0-9]+\.[0-9]+\.[0-9]+$'
          LATEST_TAG_VERSION=""
          LATEST_TAG_HAS_RELEASE=true
          RESUME_EXISTING_TAG=false
          EXISTING_TAG_COMMIT=""

          if [ -n "$LATEST_TAG" ]; then
            LATEST_TAG_VERSION="${LATEST_TAG#v}"
            if ! [[ "$LATEST_TAG_VERSION" =~ $SEMVER_REGEX ]]; then
              echo "❌ Latest release tag $LATEST_TAG is not a supported semantic version"
              exit 1
            fi
            if ! gh release view "$LATEST_TAG" >/dev/null 2>&1; then
              LATEST_TAG_HAS_RELEASE=false
            fi
            if version_gt "$LATEST_TAG_VERSION" "$BASE_VERSION"; then
              BASE_VERSION="$LATEST_TAG_VERSION"
            fi
          fi

          if [ -n "$INPUT_VERSION" ]; then
            if ! [[ "$INPUT_VERSION" =~ $SEMVER_REGEX ]]; then
              echo "❌ version input must use x.y.z format"
              exit 1
            fi
            if version_lt "$INPUT_VERSION" "$BASE_VERSION"; then
              echo "❌ version input $INPUT_VERSION is older than current source/release version $BASE_VERSION"
              exit 1
            fi
            VERSION="$INPUT_VERSION"
          elif [ -n "$LATEST_TAG_VERSION" ] && [ "$LATEST_TAG_HAS_RELEASE" = "false" ]; then
            VERSION="$LATEST_TAG_VERSION"
            echo "ℹ️ Latest tag $LATEST_TAG exists without a GitHub release. Resuming release publish."
          elif [ -n "$LATEST_TAG_VERSION" ] && version_gt "$FILE_VERSION" "$LATEST_TAG_VERSION"; then
            VERSION="$FILE_VERSION"
            echo "ℹ️ VERSION already leads the latest tag. Reusing pending source version $VERSION."
          else
            if ! [[ "$BASE_VERSION" =~ $SEMVER_REGEX ]]; then
              echo "❌ Cannot derive a semantic version from VERSION=$FILE_VERSION and latest tag=${LATEST_TAG:-none}"
              exit 1
            fi
            IFS='.' read -r MAJOR MINOR PATCH <<< "$BASE_VERSION"
            case "$BUMP_TYPE" in
              major)
                VERSION="$((MAJOR + 1)).0.0"
                ;;
              minor)
                VERSION="$MAJOR.$((MINOR + 1)).0"
                ;;
              patch)
                VERSION="$MAJOR.$MINOR.$((PATCH + 1))"
                ;;
              *)
                echo "❌ Unsupported bump type: $BUMP_TYPE"
                exit 1
                ;;
            esac
          fi

          TAG="v$VERSION"

          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "❌ Release $TAG already exists. Choose a newer version or different bump type."
            exit 1
          fi

          EXISTING_TAG_COMMIT="$(git ls-remote origin "refs/tags/$TAG" | awk '{print $1}' | head -1)"
          if [ -z "$EXISTING_TAG_COMMIT" ] && git tag -l "$TAG" | grep -q "$TAG"; then
            EXISTING_TAG_COMMIT="$(git rev-list -n 1 "$TAG")"
          fi

          if [ -n "$EXISTING_TAG_COMMIT" ]; then
            RESUME_EXISTING_TAG=true
            echo "ℹ️ Tag $TAG already exists without a GitHub release. Reusing tagged commit $EXISTING_TAG_COMMIT."
          fi

          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "base_version=$BASE_VERSION" >> "$GITHUB_OUTPUT"
          echo "source_version=$FILE_VERSION" >> "$GITHUB_OUTPUT"
          echo "resume_existing_tag=$RESUME_EXISTING_TAG" >> "$GITHUB_OUTPUT"
          if [ -n "$EXISTING_TAG_COMMIT" ]; then
            echo "existing_tag_commit=$EXISTING_TAG_COMMIT" >> "$GITHUB_OUTPUT"
          fi
          echo "🚀 Prepared release $TAG"

      - name: Run tests
        run: swift test

      - name: Require Developer ID certificate
        if: ${{ steps.release_mode.outputs.use_developer_id == 'true' }}
        run: |
          if [ -z "${SIGNING_IDENTITY:-}" ]; then
            echo "❌ Release workflow requires a Developer ID Application certificate"
            echo "   Configure DEVELOPER_ID_CERT_BASE64 and DEVELOPER_ID_CERT_PASSWORD secrets."
            exit 1
          fi
          echo "✅ Using Developer ID certificate: $SIGNING_IDENTITY"

      - name: Build release app bundles
        run: |
          case "${{ steps.release_mode.outputs.mode }}" in
            notarized)
              WHISP_VERSION="${{ steps.release_version.outputs.version }}" \
              CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
              ./scripts/build.sh --notarize
              ;;
            signed)
              WHISP_VERSION="${{ steps.release_version.outputs.version }}" \
              CODE_SIGN_IDENTITY="$SIGNING_IDENTITY" \
              ./scripts/build.sh
              ;;
            adhoc)
              WHISP_VERSION="${{ steps.release_version.outputs.version }}" \
              ./scripts/build.sh
              ;;
            *)
              echo "❌ Unknown release mode: ${{ steps.release_mode.outputs.mode }}"
              exit 1
              ;;
          esac

      - name: Create release DMG
        run: |
          if [ "${{ steps.release_mode.outputs.mode }}" = "notarized" ]; then
            WHISP_VERSION="${{ steps.release_version.outputs.version }}" \
            ./scripts/create-dmg.sh --notarize
          else
            WHISP_VERSION="${{ steps.release_version.outputs.version }}" \
            ./scripts/create-dmg.sh
          fi

      - name: Create fallback app zip
        if: ${{ steps.release_mode.outputs.include_zip == 'true' }}
        run: |
          ditto -c -k --keepParent "Whisp.app" "Whisp-${{ steps.release_version.outputs.version }}.zip"

      - name: Create checksum
        run: |
          shasum -a 256 "Whisp-${{ steps.release_version.outputs.version }}.dmg" \
            > "Whisp-${{ steps.release_version.outputs.version }}.dmg.sha256"

      - name: Commit release version
        id: commit_release_version
        env:
          EVENT_NAME: ${{ github.event_name }}
          RESUME_EXISTING_TAG: ${{ steps.release_version.outputs.resume_existing_tag }}
          EXISTING_TAG_COMMIT: ${{ steps.release_version.outputs.existing_tag_commit }}
        run: |
          TARGET_VERSION="${{ steps.release_version.outputs.version }}"
          FILE_VERSION="$(cat VERSION | tr -d '[:space:]')"
          CURRENT_COMMIT="$(git rev-parse HEAD)"
          REMOTE_HEAD="$(git ls-remote origin "refs/heads/$GITHUB_REF_NAME" | awk '{print $1}')"
          SHOULD_PUBLISH=true

          if [ -n "$REMOTE_HEAD" ] && [ "$REMOTE_HEAD" != "$CURRENT_COMMIT" ]; then
            if [ "$EVENT_NAME" = "push" ]; then
              echo "ℹ️ origin/$GITHUB_REF_NAME advanced during this run. Skipping publish because a newer push-triggered release run should ship the latest master commit."
              SHOULD_PUBLISH=false
            else
              echo "❌ origin/$GITHUB_REF_NAME advanced during this run. Re-run the release workflow from the latest master commit."
              exit 1
            fi
          fi

          if [ "$SHOULD_PUBLISH" = "true" ] && [ "$RESUME_EXISTING_TAG" = "true" ]; then
            if [ -z "$EXISTING_TAG_COMMIT" ]; then
              echo "❌ Resume requested for $TARGET_VERSION, but no existing tag commit was resolved."
              exit 1
            fi
            CURRENT_COMMIT="$EXISTING_TAG_COMMIT"
            echo "ℹ️ Reusing existing release tag commit $CURRENT_COMMIT"
          elif [ "$SHOULD_PUBLISH" = "true" ] && [ "$FILE_VERSION" != "$TARGET_VERSION" ]; then
            printf '%s\n' "$TARGET_VERSION" > VERSION

            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add VERSION
            git commit -m "chore: bump VERSION to $TARGET_VERSION for release"

            CURRENT_COMMIT="$(git rev-parse HEAD)"
            echo "✅ Created release VERSION commit $CURRENT_COMMIT"
            echo "ℹ️ Skipping branch push; the release tag will point at the release commit instead of updating $GITHUB_REF_NAME."
          elif [ "$SHOULD_PUBLISH" = "true" ]; then
            echo "ℹ️ VERSION already set to $TARGET_VERSION"
          fi

          echo "should_publish=$SHOULD_PUBLISH" >> "$GITHUB_OUTPUT"
          if [ "$SHOULD_PUBLISH" = "true" ]; then
            echo "commit_sha=$CURRENT_COMMIT" >> "$GITHUB_OUTPUT"
          fi

      - name: Create tag and GitHub Release
        if: ${{ steps.commit_release_version.outputs.should_publish == 'true' }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v$VERSION"
          if ! git tag -l "$TAG" | grep -q "$TAG"; then
            git tag "$TAG" "${{ steps.commit_release_version.outputs.commit_sha }}"
          fi
          if ! git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            git push origin "$TAG"
          fi

          cat > /tmp/release-notes.md <<'NOTES'
          ## Installation

          1. Download the `.dmg` file below and drag **Whisp.app** into `/Applications/`.
          2. The DMG also includes **Uninstall Whisp.app** if you want a full cleanup later.

          NOTES

          case "${{ steps.release_mode.outputs.mode }}" in
            notarized)
              cat >> /tmp/release-notes.md <<'NOTES'
          3. Open Whisp from `/Applications/`. On first launch, grant the requested permissions:
            - **Microphone** — for voice recording
            - **Accessibility** — for Smart Paste
            - **Input Monitoring** — for the global hotkey

          NOTES
              ;;
            signed)
              cat >> /tmp/release-notes.md <<'NOTES'
          3. This build is signed with a Developer ID certificate but is not notarized. If macOS blocks it on first launch, run this once:
            ```bash
            sudo xattr -cr /Applications/Whisp.app
            ```
          4. Open Whisp from `/Applications/`. On first launch, grant the requested permissions:
            - **Microphone** — for voice recording
            - **Accessibility** — for Smart Paste
            - **Input Monitoring** — for the global hotkey

          > You only need to run the `xattr` command once per download. Permissions persist across app restarts.

          NOTES
              ;;
            adhoc)
              cat >> /tmp/release-notes.md <<'NOTES'
          3. Whisp is open-source and this build is not notarized. If macOS blocks it on first launch, run this once:
            ```bash
            sudo xattr -cr /Applications/Whisp.app
            ```
          4. Open Whisp from `/Applications/`. On first launch, grant the requested permissions:
            - **Microphone** — for voice recording
            - **Accessibility** — for Smart Paste
            - **Input Monitoring** — for the global hotkey

          > You only need to run the `xattr` command once per download. Permissions persist across app restarts.

          NOTES
              ;;
            *)
              echo "❌ Unknown release mode: ${{ steps.release_mode.outputs.mode }}"
              exit 1
              ;;
          esac

          # Append auto-generated changelog
          PREV_TAG="$(git tag --sort=-v:refname | grep -v "^$TAG$" | head -1 || true)"
          if [ -n "$PREV_TAG" ]; then
            echo -e "\n## What's Changed\n" >> /tmp/release-notes.md
            gh api repos/${{ github.repository }}/compare/${PREV_TAG}...${TAG} \
              --jq '.commits[] | "- " + (.commit.message | split("\n")[0]) + " (" + (.sha[:7]) + ")"' \
              >> /tmp/release-notes.md 2>/dev/null || true
          fi

          release_assets=(
            "Whisp-${{ steps.release_version.outputs.version }}.dmg"
            "Whisp-${{ steps.release_version.outputs.version }}.dmg.sha256"
          )

          if [ "${{ steps.release_mode.outputs.include_zip }}" = "true" ]; then
            release_assets+=("Whisp-${{ steps.release_version.outputs.version }}.zip")
          fi

          gh release create "$TAG" \
            "${release_assets[@]}" \
            --verify-tag \
            --target "${{ steps.commit_release_version.outputs.commit_sha }}" \
            --title "Whisp ${{ steps.release_version.outputs.version }}" \
            --notes-file /tmp/release-notes.md
